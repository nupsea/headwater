services:
  headwater:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - headwater-data:/app/.headwater
      - ../data/sample:/data/sample:ro
    environment:
      - HEADWATER_LLM_PROVIDER=${HEADWATER_LLM_PROVIDER:-none}
      - HEADWATER_LLM_API_KEY=${HEADWATER_LLM_API_KEY:-}
      - HEADWATER_LLM_MODEL=${HEADWATER_LLM_MODEL:-claude-sonnet-4-20250514}

  ui:
    build:
      context: ./ui
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - API_URL=http://headwater:8000
    depends_on:
      - headwater

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: headwater
      POSTGRES_PASSWORD: headwater
      POSTGRES_DB: headwater_dev
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  headwater-data:
  postgres_data:
